name: 🧹 Chore
description: Maintenance task (deps, config, CI)
title: "[CHORE] "
labels: ["chore"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task Summary
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why is this needed?

  - type: checkboxes
    id: impact
    attributes:
      label: Impact Level
      options:
        - label: No functional impact
        - label: Minor dev impact
        - label: Possible side effects